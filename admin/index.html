<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Control Panel</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #090d16;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: hsl(220, 100%, 60%);
            --accent: hsl(195, 100%, 45%);
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --font-main: 'Outfit', sans-serif;
            --font-arabic: 'Amiri', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.45;
            animation: float 25s infinite ease-in-out;
        }

        .shape-1 {
            width: 450px;
            height: 450px;
            background: var(--primary);
            top: -100px;
            left: -150px;
        }

        .shape-2 {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: -50px;
            right: -100px;
            animation-delay: -12s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 80px) scale(1.1); }
        }

        /* Glassmorphism Login Container */
        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .lock-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px auto;
            color: white;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .arabic-name {
            font-family: var(--font-arabic);
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            direction: rtl;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: white;
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.25);
            background: rgba(0, 0, 0, 0.35);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
            font-size: 0.85rem;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none; /* hidden by default, shown dynamically */
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .error-message.show {
            display: flex;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        /* subtle loading effect */
        .btn-submit.loading {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-container">
        <div class="lock-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h2>Admin Console</h2>
        <div class="arabic-name">مُحَمَّد طَـٰٓه۪ 𓂆 أُبُّ</div>

        <!-- Dynamic error panel -->
        <div id="errorContainer" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Incorrect passcode entered.</span>
        </div>

        <form id="loginForm">
            <!-- CSRF token simulation: static hidden token for demo -->
            <input type="hidden" name="csrf_token" id="csrf_token" value="demo_static_csrf_token_2026">
            
            <div class="input-group">
                <label for="passcode">Admin Passcode</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="passcode" id="passcode" placeholder="••••••••" required autocomplete="current-password" autofocus>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Authenticate</button>
        </form>

        <a href="#" class="back-link" id="returnLink"><i class="fas fa-arrow-left"></i> Return to Site</a>
    </div>

    <script>
        // ------------------------------------------------------------------
        // STATIC HTML DEMO: Simulates the functionality from original PHP
        // - Brute-force protection (localStorage based, 15 minutes lockout)
        // - CSRF token verification simulation
        // - Passcode verification (hardcoded demo passcode: "admin123")
        // - Session-like redirect upon successful login (to index.html demo)
        // - Failed attempts tracking per IP (simulated by client-side IP or fallback)
        // ------------------------------------------------------------------

        (function() {
            // ---------- Constants & Configuration ----------
            const DEMO_PASSCODE_HASH_CHECK = "admin123";   // simple hardcoded passcode for demo
            const LOCKOUT_DURATION_MS = 15 * 60 * 1000;    // 15 minutes
            const MAX_ATTEMPTS = 5;
            
            // Helper to get or create a client-side "fingerprint" to simulate IP-based lockout
            // Using localStorage + a semi-unique visitor ID (since real IP not exposed)
            function getVisitorId() {
                let visitor = localStorage.getItem('visitor_id');
                if (!visitor) {
                    visitor = 'visitor_' + Math.random().toString(36).substring(2) + '_' + Date.now();
                    localStorage.setItem('visitor_id', visitor);
                }
                return visitor;
            }

            const visitorKey = getVisitorId();
            const FAILED_KEY = `failed_attempts_${visitorKey}`;
            const LOCKOUT_KEY = `lockout_until_${visitorKey}`;
            const SESSION_KEY = `admin_logged_in_sim`;     // simulate server session

            // DOM elements
            const errorContainer = document.getElementById('errorContainer');
            const errorTextSpan = document.getElementById('errorText');
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const passcodeInput = document.getElementById('passcode');
            
            // Helper: show error message
            function showError(message) {
                errorTextSpan.innerText = message;
                errorContainer.classList.add('show');
                // auto-hide after 4 seconds
                setTimeout(() => {
                    if (errorContainer.classList.contains('show')) {
                        errorContainer.classList.remove('show');
                    }
                }, 4500);
            }

            function hideError() {
                errorContainer.classList.remove('show');
            }

            // CSRF token validation simulation (checks if token matches expected format)
            function validateCsrfToken(token) {
                // In original PHP, token validated via session. Here we simulate:
                // token is sent from hidden input. For demo, we accept any non-empty token that matches "demo_static_csrf_token_2026"
                // but we also simulate "Security check failed" if token missing/incorrect.
                const expectedToken = document.getElementById('csrf_token').value;
                if (!token || token !== expectedToken) {
                    return false;
                }
                return true;
            }

            // Check brute-force lockout (localStorage based)
            function isIpLockedOut() {
                const lockoutUntilRaw = localStorage.getItem(LOCKOUT_KEY);
                if (!lockoutUntilRaw) return false;
                const lockoutUntil = parseInt(lockoutUntilRaw, 10);
                const now = Date.now();
                if (now < lockoutUntil) {
                    // still locked
                    const remainingMinutes = Math.ceil((lockoutUntil - now) / 60000);
                    return { locked: true, remaining: remainingMinutes };
                } else {
                    // lock expired, clear flag
                    localStorage.removeItem(LOCKOUT_KEY);
                    return { locked: false };
                }
            }

            // record failed attempt (increment counter, set lockout if MAX reached)
            function recordFailedAttempt() {
                let attempts = parseInt(localStorage.getItem(FAILED_KEY) || '0', 10);
                attempts++;
                localStorage.setItem(FAILED_KEY, attempts);
                
                if (attempts >= MAX_ATTEMPTS) {
                    // lock out this visitor for 15 minutes
                    const lockUntil = Date.now() + LOCKOUT_DURATION_MS;
                    localStorage.setItem(LOCKOUT_KEY, lockUntil);
                    // keep failed attempts stored to preserve state even after lockout period? but upon lockout we can keep.
                    // After lockout we reset attempts on success or after expiry (checked in isIpLockedOut)
                }
                return attempts;
            }

            // clear failed attempts (on successful login)
            function clearFailedAttempts() {
                localStorage.removeItem(FAILED_KEY);
                localStorage.removeItem(LOCKOUT_KEY);
            }

            // Simulate passcode verification using plain text (since original used password_verify)
            // In a real backend would verify hash, but for this static demo we just compare with DEMO_PASSCODE_HASH_CHECK
            function verifyPasscode(enteredPasscode) {
                return enteredPasscode === DEMO_PASSCODE_HASH_CHECK;
            }

            // Simulate a redirect to index.html / dashboard (since original redirects to index.php)
            function redirectToDashboard() {
                // Simulate session storage to keep "logged in" state across this page? 
                // Actually in original, after redirect, index.php would check session. In pure HTML/CSS/JS demo,
                // we create a fake admin dashboard page simulation: either alert and redirect to a simple admin panel simulation,
                // but because the requirement is to convert to only HTML, we redirect to a dummy admin.html? 
                // Since no backend, we create an in-memory flag and redirect to a 'dashboard.html' that doesn't exist,
                // better: notify success and then change window location to "admin_dashboard.html" with demo content.
                // For seamless experience, we store a "admin_session" flag and redirect to a mock dashboard page built on the fly?
                // Actually, since user expects the same behavior (redirect to index.php style), but we are limited to only HTML.
                // Option: Redirect to current page? Not ideal. Better: create a simple "admin.html" inline? Not possible without extra file.
                // We'll simulate login success by setting a session flag and redirecting to a simple about:blank? Not user-friendly.
                // Instead, we replace the entire login container with a success message and show "Admin Panel" mock content.
                // That stays within the same page, preserving the conversion requirement.
                // However the original PHP redirected to "index.php". For a pure HTML experience that remains consistent,
                // we can mimic a "logged-in dashboard" view by dynamically rendering admin panel content, and also provide a logout.
                // This maintains the single HTML file. Let's do it elegantly.
                showAdminDashboard();
            }

            // Create a minimal admin dashboard inside the same page (replaces login UI)
            function showAdminDashboard() {
                const container = document.querySelector('.login-container');
                // store original background shapes but replace inner content
                const bgShapes = document.querySelectorAll('.bg-shape');
                const newInnerHtml = `
                    <div class="lock-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h2>Admin Dashboard</h2>
                    <div class="arabic-name">✓ Authentication Successful</div>
                    <div style="margin: 20px 0; text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px;">
                        <p style="margin-bottom: 12px;"><i class="fas fa-user-shield" style="margin-right: 10px;"></i> Welcome back, Administrator.</p>
                        <p style="margin-bottom: 12px;"><i class="fas fa-chart-line"></i>  You have full access to the control panel.</p>
                        <p><i class="fas fa-clock"></i>  Session security: active (simulated).</p>
                    </div>
                    <button id="logoutBtn" class="btn-submit" style="background: linear-gradient(135deg, #475569, #1e293b); margin-top: 10px;">Logout</button>
                    <a href="#" id="returnAfterLogin" class="back-link"><i class="fas fa-arrow-left"></i> Return to Main Site</a>
                `;
                container.innerHTML = newInnerHtml;
                
                // Attach logout functionality
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        // clear session simulation and reload to login form
                        localStorage.removeItem(SESSION_KEY);
                        clearFailedAttempts();
                        window.location.reload();   // refresh to original login page
                    });
                }
                const returnLinkAfter = document.getElementById('returnAfterLogin');
                if (returnLinkAfter) {
                    returnLinkAfter.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert("Return to main site (simulated) — you would be redirected to ../index.html");
                        // placeholder: could change window.location.href = "../index.html"; but for demo just alert
                        window.location.href = "#";
                    });
                }
                
                // mark session as logged in in local storage
                localStorage.setItem(SESSION_KEY, 'true');
            }

            // check if already logged in (simulate isAdminLoggedIn)
            function isAlreadyLoggedIn() {
                return localStorage.getItem(SESSION_KEY) === 'true';
            }

            // If already logged in, redirect to dashboard view (instead of login form)
            if (isAlreadyLoggedIn()) {
                // show dashboard immediately
                showAdminDashboard();
                // stop further login logic
                return;
            }

            // Set up form submit handler
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                hideError();
                
                // Get form values
                const passcode = passcodeInput.value.trim();
                const csrfTokenValue = document.getElementById('csrf_token').value;
                
                // 1. CSRF validation simulation
                if (!validateCsrfToken(csrfTokenValue)) {
                    showError('Security check failed. Please refresh and try again.');
                    return;
                }
                
                // 2. Check brute-force lockout (IP-based simulation)
                const lockoutStatus = isIpLockedOut();
                if (lockoutStatus.locked) {
                    showError(`Too many failed login attempts. Your IP has been locked out for ${lockoutStatus.remaining} minutes.`);
                    return;
                }
                
                // 3. Verify passcode (simulate password_verify)
                const isValidPass = verifyPasscode(passcode);
                
                if (isValidPass) {
                    // Success: clear failed attempts, simulate session regeneration (session_regenerate_id)
                    clearFailedAttempts();
                    
                    // Simulate session fix protection: just store session flag with user-agent + timestamp
                    const userAgent = navigator.userAgent;
                    const simulatedSession = {
                        admin_logged_in: true,
                        user_ip_sim: "client_" + visitorKey.slice(-8),
                        user_agent: userAgent,
                        timestamp: Date.now()
                    };
                    localStorage.setItem(SESSION_KEY, JSON.stringify(simulatedSession));
                    
                    // show dashboard / redirect effect (replace view)
                    showAdminDashboard();
                } else {
                    // Failure: record attempt and show error
                    const newAttemptCount = recordFailedAttempt();
                    // After recording, check lockout again (if reached limit)
                    const newLockCheck = isIpLockedOut();
                    if (newLockCheck.locked) {
                        showError(`Too many failed login attempts. Your IP has been locked out for ${newLockCheck.remaining} minutes.`);
                    } else {
                        const remainingAttempts = MAX_ATTEMPTS - (parseInt(localStorage.getItem(FAILED_KEY) || '0', 10));
                        let errorMsg = 'Incorrect passcode entered.';
                        if (remainingAttempts > 0 && remainingAttempts <= 3) {
                            errorMsg += ` You have ${remainingAttempts} attempt(s) remaining before lockout.`;
                        }
                        showError(errorMsg);
                    }
                    // clear passcode field for better UX
                    passcodeInput.value = '';
                    passcodeInput.focus();
                }
            });
            
            // Return to site link functionality (for main site simulation)
            const returnLink = document.getElementById('returnLink');
            if (returnLink) {
                returnLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    // original had href="../index.html" - simulate with alert and optional redirect demo
                    if (confirm("Return to main website? (demo will stay on this page)")) {
                        // In a real environment, you'd redirect: window.location.href = "../index.html";
                        alert("In a deployed version, you would be redirected to the homepage. (Static Demo)");
                    }
                });
            }
            
            // Optional: dynamic CSRF token refresh (simulate token rotation, but not required)
            // For completeness, keep initial token as it is.
            // Also, you could add a global listener to prevent double submission
            loginForm.addEventListener('submit', function disableButton() {
                if (submitBtn.classList.contains('loading')) return;
                submitBtn.classList.add('loading');
                setTimeout(() => {
                    // re-enable only if not removed by dashboard replace (but dashboard replaces whole container)
                    if (document.getElementById('submitBtn')) {
                        submitBtn.classList.remove('loading');
                    }
                }, 800);
            });
        })();
    </script>
</body>
</html>
